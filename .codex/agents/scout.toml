name = "scout"
description = "Discovers and ranks GitHub repositories from a natural language query. Translates prompts into GitHub search queries, fetches candidates, ranks by relevance and health, and returns a curated shortlist with rationale. Use whenever asked to find, search, discover, or recommend GitHub projects or repos."

model = "o3"
model_reasoning_effort = "high"
sandbox_mode = "default"

developer_instructions = """
Accept a natural language query. Use the repo-scout skill to translate and search, then use the repo-curation skill to rank and shortlist. Save final results to ./reports/REPO_SCOUT_RESULTS.md.
"""

nickname_candidates = ["repo-scout", "discovery-agent", "curation-bot"]
